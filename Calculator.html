<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator | Student Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .calculator-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .result-box {
            display: none;
            transition: all 0.3s ease-in-out;
        }
        .grade-a { color: #28a745; font-weight: bold; }
        .grade-fail { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            <header class="text-center mb-4">
                <h1 class="display-5 fw-bold text-primary">Grade Calculator</h1>
                <p class="text-muted">Enter marks for 5 subjects (0-100)</p>
            </header>

            <article class="card calculator-card p-4">
                <form id="gradeForm">
                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label">Mathematics</label>
                            <input type="number" class="form-control subject-input" min="0" max="100" required placeholder="0-100">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Science</label>
                            <input type="number" class="form-control subject-input" min="0" max="100" required placeholder="0-100">
                        </div>
                        <div class="col-6">
                            <label class="form-label">English</label>
                            <input type="number" class="form-control subject-input" min="0" max="100" required placeholder="0-100">
                        </div>
                        <div class="col-6">
                            <label class="form-label">History</label>
                            <input type="number" class="form-control subject-input" min="0" max="100" required placeholder="0-100">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Computer Science</label>
                            <input type="number" class="form-control subject-input" min="0" max="100" required placeholder="0-100">
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Calculate Results</button>
                        <button type="reset" class="btn btn-outline-secondary btn-sm" onclick="hideResults()">Clear</button>
                    </div>
                </form>
            </article>

            <section id="resultArea" class="result-box mt-4">
                <div class="card p-4 border-0 shadow-sm text-center">
                    <h3 class="mb-3">Summary</h3>
                    <div class="row border-top pt-3">
                        <div class="col-4">
                            <p class="small text-muted mb-0">Total</p>
                            <h4 id="displayTotal">0</h4>
                        </div>
                        <div class="col-4">
                            <p class="small text-muted mb-0">Average</p>
                            <h4 id="displayAvg">0%</h4>
                        </div>
                        <div class="col-4">
                            <p class="small text-muted mb-0">Grade</p>
                            <h4 id="displayGrade">-</h4>
                        </div>
                    </div>
                    <div id="statusMsg" class="mt-2 fw-bold"></div>
                </div>
            </section>

        </div>
    </div>
</main>

<script>
    const gradeForm = document.getElementById('gradeForm');
    const resultArea = document.getElementById('resultArea');

    gradeForm.addEventListener('submit', function(e) {
        e.preventDefault(); 

        const inputs = document.querySelectorAll('.subject-input');
        let total = 0;
        let marksArray = [];

        inputs.forEach(input => {
            const val = parseFloat(input.value);
            total += val;
            marksArray.push(val);
        });

        const average = total / inputs.length;

        let grade = "";
        let statusClass = "";

        if (average >= 90) {
            grade = "A";
            statusClass = "text-success";
        } else if (average >= 75) {
            grade = "B";
            statusClass = "text-primary";
        } else if (average >= 60) {
            grade = "C";
            statusClass = "text-info";
        } else if (average >= 40) {
            grade = "D";
            statusClass = "text-warning";
        } else {
            grade = "Fail";
            statusClass = "text-danger";
        }

        document.getElementById('displayTotal').innerText = total;
        document.getElementById('displayAvg').innerText = average.toFixed(1) + "%";
        document.getElementById('displayGrade').innerText = grade;
        
        const statusMsg = document.getElementById('statusMsg');
        statusMsg.innerText = grade === "Fail" ? "Result: Failed" : "Result: Passed";
        statusMsg.className = "mt-2 fw-bold " + statusClass;

        resultArea.style.display = 'block';
    });

    function hideResults() {
        resultArea.style.display = 'none';
    }
    
</script>

</body>
</html>
